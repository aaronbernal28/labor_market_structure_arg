enes: "enes_2019"
id_1: "nocues"
id_2: "nhog"
max_caes_id: 10000
seed: 28

random_graphs:
  wcm_scale: 500

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_graphs: data/graphs
  images: images

datasets:
  features:
    - name: "sex_id"
      type: "int"
      default: 0
    - name: "public_worker"
      type: "int"
      default: 0
    - name: "total_income"
      type: "float"
      default: NaN
    - name: "age"
      type: "int"
      default: NaN
    - name: "nivel_ed"
      type: "float"
      default: NaN

  enes_2019:
    source: data/raw/base_enespersonas.csv
    url: "https://datasets.datos.mincyt.gob.ar/dataset/b0c0ae96-4028-4d0e-919a-c6830110f6b6/resource/421a7e29-7d15-4b69-a2e8-d7242b58b770/download/base_enespersonas.csv"
    id_1: "nocues"
    id_2: "nhog"
    id_3: "miembro"
    id_caes: "v182caes"
    id_ciuo: "v183ciuo"
    id_cno: "v183cno"
    ponderation: "f_calib3"
    features:
      sex_id: "v109"
      public_worker: "v188" # en realidad es "v188"==1
      total_income: "ITI" # Ingreso total individual
      age: "v108"
      nivel_ed: "nivel_ed" # < 11

  enes_2021:
    source: data/raw/base_enespersonas_2021.csv
    url: null
    year: 2021
    id_1: "CUEST"
    id_2: null
    id_3: null
    id_caes: "CAES_num"
    id_ciuo: "CIUO_encuestado"
    id_cno: null
    ponderation: "POND1_FIN"
    features:
     sex_id: "SEXO"
     public_worker: "M3_7" # en realidad es "M3_7"==1
     total_income: null
     age: null
     nivel_ed: null

  enes_2019_unweighted:
    source: data/raw/base_enespersonas.csv
    url: "https://datasets.datos.mincyt.gob.ar/dataset/b0c0ae96-4028-4d0e-919a-c6830110f6b6/resource/421a7e29-7d15-4b69-a2e8-d7242b58b770/download/base_enespersonas.csv"
    id_1: "nocues"
    id_2: "nhog"
    id_3: "miembro"
    id_caes: "v182caes"
    id_ciuo: "v183ciuo"
    id_cno: "v183cno"
    ponderation: null
    features:
      sex_id: "v109"
      public_worker: "v188"
      total_income: "ITI"
      age: "v108"
      nivel_ed: "nivel_ed"

  enes_2021_unweighted:
    source: data/raw/base_enespersonas_2021.csv
    url: null
    year: 2021
    id_1: "CUEST"
    id_2: null
    id_3: null
    id_caes: "CAES_num"
    id_ciuo: "CIUO_encuestado"
    id_cno: null
    ponderation: null
    features:
     sex_id: "SEXO"
     public_worker: "M3_7"
     total_income: null
     age: null
     nivel_ed: null

  eph_generic:
    source: data/raw/eph/*
    url: "https://www.indec.gob.ar/ftp/cuadros/menusuperior/eph/*"
    id_1: "CODUSU"
    id_2: "NRO_HOGAR"
    id_3: "COMPONENTE"
    id_caes: "PP04B_COD" # o "PP04B COD"
    id_ciuo: null
    id_cno: "PP04D_COD" # o "PP04D COD"
    ponderation: "PONDERA"
    features:
      sex_id: "PP03G_COD"
      public_worker: "CH04"
      total_income: "P47T" # Ingreso total individual
      age: "CH06"
      nivel_ed: "CH12" # < 10

caes:
  source: data/raw/nodelist_caes.csv
  id: "v182caes"
  label: "caeslabel"
  letra: "caesletra"
  grupo: "caesag"
  label_color: "caeslabel_color"
  letra_color: "caesletra_color"
  grupo_color: "caesag_color"
  partition: 1

ciuo:
  source: data/raw/nodelist_ciuo.csv
  id: "v183ciuo"
  label: "ciuolabel"
  letra: "ciuo1diglabel"
  grupo: "ciuo3cat"
  label_color: "ciuolabel_color"
  letra_color: "ciuo1diglabel_color"
  grupo_color: "ciuo3cat_color"
  partition: 0

cno:
  source: null
  id: "v183cno"
  label: null
  letra: null
  grupo: null
  label_color: null
  letra_color: null
  grupo_color: null
  partition: 0

figsizes:
  top_n_bar: [8, 4]
  edge_correlation: [6, 6]
  bipartite: [12, 8]
  projection: [8, 8]
  stacked:
    caes: [12, 3]
    ciuo: [12, 5]
  heatmap: [18, 10]
  histogram: [8, 6]
  catplot: [10, 5]
  resolution: [4, 4]

# Colormaps for continuous-feature projection plots.
cmaps:
  female_pct: "coolwarm"
  income_mean: "cubehelix"
  nivel_ed_mean: "gist_stern"
  default: "magma"
  income_std: "YlGnBu"
  nivel_ed_std: "YlGnBu"
  age_std: "YlGnBu"

community:
  resolution:
    caes: 5.62 # 10**(0.75)
    ciuo: 5.62 # sqrt(10)
    cno: 1.0
    "0.05":
      caes: 5.62
      ciuo: 5.62
      cno: 1.0
    "1.00":
      caes: 1.0
      ciuo: 1.022
      cno: 1.0
  max:
    caes: 15
    ciuo: 20
    cno: 10

FACTOR_NODE_SIZE:
  caes : 11.6
  ciuo : 4.75
  cno : 0.8

NODE_SIZE_EXPONENT : 0.7
EDGE_ALPHA:
  caes : 0.85
  ciuo : 0.45
  cno : 0.5
NODE_ALPHA : 0.6

alpha_sensitivity:
  reference_coverage_threshold: 0.99
  default_alpha_eph: 0.001

# Palettes for categorical features.
palette:
  ciuo1diglabel: ["#374E55", "#DF8F44", "#00A1D5", "#B24745", "#79AF97", "#6A6599", "#80796B", "#05897B", "#5C068C","#333333"]
  ciuo3cat: ["#cccccc","#f1f22e", "#17becf"] # gray, yellow, cyan

